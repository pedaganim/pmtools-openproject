name: Deploy OpenProject

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to EC2 via SSM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Note: Replace AWS_ACCOUNT_ID with your actual AWS Account ID or set it as a GitHub Secret
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-openproject-role
          aws-region: ap-southeast-2

      - name: Deploy OpenProject via AWS SSM
        run: |
          # 1. Find the target EC2 Instance ID using its Name tag
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=OpenProject-Server" "Name=instance-state-name,Values=running" \
            --query "Reservations[*].Instances[*].InstanceId" \
            --output text)
            
          if [ -z "$INSTANCE_ID" ]; then
            echo "Error: No running instance found with tag Name=OpenProject-Server"
            exit 1
          fi
          
          echo "Found Target Instance: $INSTANCE_ID"
          
          # 2. Send the deployment commands via SSM RunShellScript
          # This script will clone the official OpenProject compose repo if missing, pull latest images, and restart containers.
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["if [ ! -d /opt/openproject ]; then sudo git clone https://github.com/opf/openproject-docker-compose.git --depth=1 --branch=stable/14 /opt/openproject; fi", "cd /opt/openproject", "sudo cp -n .env.example .env || true", "sudo docker compose pull", "sudo OPENPROJECT_HOST__NAME=pmo.nearborrow.com.au OPENPROJECT_HTTPS=true docker compose up -d"]' \
            --query "Command.CommandId" \
            --output text)
            
          echo "SSM Command sent. Command ID: $COMMAND_ID"
          
          # 3. Wait for the command to finish executing
          echo "Waiting for command execution to complete..."
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID"
          
          # 4. Fetch and display the standard output and error
          echo "Deployment Output:"
          aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "StandardOutputContent" --output text
          echo "Deployment Errors (if any):"
          aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "StandardErrorContent" --output text
