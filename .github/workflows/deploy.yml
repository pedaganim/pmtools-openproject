name: Deploy OpenProject Infrastructure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::967438331002:role/github-actions-openproject-role
          aws-region: ap-southeast-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="deploy_sha=${{ github.sha }}"

      - name: Output Provisioned Endpoints
        run: |
          echo "Deployment successful."
          echo "Public IP (for CloudFront Origin): $(terraform output -raw public_ip)"
          echo "RDS Endpoint: $(terraform output -raw rds_endpoint)"
          echo "S3 Bucket: $(terraform output -raw s3_bucket)"
